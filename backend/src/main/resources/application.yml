spring:
  application:
    name: zault

  threads:
    virtual:
      enabled: true

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  datasource:
    url: jdbc:sqlite:${SQLITE_PATH:./data/zault.db}?busy_timeout=${SQLITE_BUSY_TIMEOUT_MS:5000}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: ${SQLITE_MAIN_DB_MAX_POOL_SIZE:8}
      minimum-idle: 2

  sql:
    init:
      mode: always

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false

server:
  port: 8080

management:
  endpoints:
    web:
      base-path: /api
      exposure:
        include: health, metrics, prometheus
  metrics:
    tags:
      application: ${spring.application.name}

zault:
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-secure-32-char-min-secret!}
    expiry: ${JWT_EXPIRY:PT1H}
  security:
    max-failed-attempts: 5
    lockout-minutes: 15

  user-db:
    base-dir: ${ZAULT_USER_DB_DIR:./data/users}
    max-open-connections: ${ZAULT_USER_DB_MAX_OPEN:10000}
    busy-timeout-ms: ${ZAULT_USER_DB_BUSY_TIMEOUT_MS:5000}

