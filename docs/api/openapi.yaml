openapi: 3.1.0
info:
  title: Zault API
  description: Zault investment dashboard backend API
  version: 0.0.1
servers:
  - url: http://localhost:8080
    description: Local development server
paths:
  /api/auth/register:
    post:
      tags:
        - auth
      operationId: register
      summary: Register a new user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username or email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/login:
    post:
      tags:
        - auth
      operationId: login
      summary: Authenticate and receive JWT cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful (JWT set in HTTP-only cookie)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "423":
          description: Account temporarily locked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/auth/logout:
    post:
      tags:
        - auth
      operationId: logout
      summary: Clear JWT cookie and log out
      responses:
        "200":
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponse"
  /api/auth/me:
    get:
      tags:
        - auth
      operationId: me
      summary: Get current authenticated user info
      responses:
        "200":
          description: Current user details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          pattern: "^[a-z0-9_]+$"
          description: Alphanumeric and underscores only, lowercased
        email:
          type: string
          format: email
          maxLength: 255
        displayName:
          type: string
          maxLength: 100
          description: Optional display name
        password:
          type: string
          minLength: 8
          maxLength: 72
    RegisterResponse:
      type: object
      required:
        - username
        - emailVerified
        - userId
      properties:
        username:
          type: string
        emailVerified:
          type: boolean
        userId:
          type: integer
          format: int64
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
    LoginResponse:
      type: object
      required:
        - username
        - emailVerified
        - scopes
      properties:
        username:
          type: string
        emailVerified:
          type: boolean
        scopes:
          type: array
          items:
            type: string
    LogoutResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - logged_out
    MeResponse:
      type: object
      required:
        - username
        - email
        - emailVerified
      properties:
        username:
          type: string
        email:
          type: string
        displayName:
          type: string
          nullable: true
        emailVerified:
          type: boolean
        userId:
          type: integer
          format: int64
        scopes:
          type: array
          items:
            type: string
        userDbPath:
          type: string
        userDbCreatedAt:
          type: string
          nullable: true
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
