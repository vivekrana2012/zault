openapi: 3.1.0
info:
  title: Zault API
  description: |
    Zault investment dashboard backend API.

    **API versioning:** All endpoints under `/api/**` except `/api/auth/login`, `/api/auth/register`, and `/api/health*` require the `X-API-Version: 1` request header. Missing or unsupported values return `400` with a structured error body.
  version: 0.0.1
servers:
- url: http://localhost:8080
  description: Generated server url
paths:
  /api/investments:
    get:
      tags:
      - investment-controller
      operationId: listInvestments
      parameters:
      - name: X-API-Version
        in: header
        description: API version — must be `1`
        required: true
        schema:
          type: string
          default: "1"
          enum:
          - "1"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvestmentDto"
    post:
      tags:
      - investment-controller
      operationId: createInvestment
      parameters:
      - name: X-API-Version
        in: header
        description: API version — must be `1`
        required: true
        schema:
          type: string
          default: "1"
          enum:
          - "1"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvestmentRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /api/auth/register:
    post:
      tags:
      - auth-controller
      operationId: register
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties: {}
  /api/auth/logout:
    post:
      tags:
      - auth-controller
      operationId: logout
      parameters:
      - name: X-API-Version
        in: header
        description: API version — must be `1`
        required: true
        schema:
          type: string
          default: "1"
          enum:
          - "1"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: string
  /api/auth/login:
    post:
      tags:
      - auth-controller
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties: {}
  /api/investments/{id}:
    delete:
      tags:
      - investment-controller
      operationId: deleteInvestment
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: X-API-Version
        in: header
        description: API version — must be `1`
        required: true
        schema:
          type: string
          default: "1"
          enum:
          - "1"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
    patch:
      tags:
      - investment-controller
      operationId: updateInvestmentAmount
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: X-API-Version
        in: header
        description: API version — must be `1`
        required: true
        schema:
          type: string
          default: "1"
          enum:
          - "1"
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvestmentAmountRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
  /api/auth/me:
    get:
      tags:
      - auth-controller
      operationId: me
      parameters:
      - name: X-API-Version
        in: header
        description: API version — must be `1`
        required: true
        schema:
          type: string
          default: "1"
          enum:
          - "1"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties: {}
components:
  schemas:
    CreateInvestmentRequest:
      type: object
      properties:
        category:
          type: string
        amount:
          type: number
    RegisterRequest:
      type: object
      properties:
        username:
          type: string
        email:
          type: string
        displayName:
          type: string
        password:
          type: string
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
    UpdateInvestmentAmountRequest:
      type: object
      properties:
        amount:
          type: number
    InvestmentDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        category:
          type: string
        amount:
          type: number
